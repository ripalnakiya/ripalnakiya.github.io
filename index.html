<script>
  function onCopyEmail(btn) {
    const originalColor = btn.style.backgroundColor;
    const orignalShadow = btn.style.boxShadow;
    const originalText = btn.innerText;
    navigator.clipboard.writeText('ripalnakiya@gmail.com');
    btn.style.backgroundColor = '#FF2DAA';
    btn.style.boxShadow = '0 0 15px #FF6FD8, 0 0 30px #FF6FD8, 0 0 45px #FF6FD8';
    btn.innerText = 'Copied to clipboard !';
    setTimeout(() => { btn.innerText = originalText; btn.style.backgroundColor = originalColor; btn.style.boxShadow = orignalShadow; }, 2000);
  }
</script>
